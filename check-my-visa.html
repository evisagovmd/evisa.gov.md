<!DOCTYPE html>
<html>

<head>

<title>Check Visa</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#efefef;
}

/* HEADER IMAGE */

.header img{
width:60%;
height:40px;
display:block;
}

/* COLOR STRIP */

.colorbar{
height:6px;
display:flex;
}

.colorbar div{
flex:1;
}

.c1{background:#f6a623;}
.c2{background:#a142f4;}
.c3{background:#34a853;}
.c4{background:#4285f4;}
.c5{background:#ea4335;}
.c6{background:#fbbc05;}

/* NAVBAR */

.navbar{
background:#2f65a7;
display:flex;
justify-content:center;
}

.navbar a{
color:white;
text-decoration:none;
padding:14px 20px;
font-size:14px;
}

.navbar a:hover{
background:#1e4c86;
}

/* MAIN LAYOUT */

.main{
width:1000px;
margin:40px auto;
display:flex;
}

/* LEFT INFO BOX */

.leftbox{
width:230px;
margin-right:30px;
}

.leftbox .card{
background:white;
border:1px solid #ccc;
padding:15px;
}

.leftbox button{
width:100%;
padding:10px;
background:#4d87c7;
border:none;
color:white;
cursor:pointer;
}

/* VISA FORM AREA */

.visabox{
flex:1;
background:#c9dcdc;
border:1px solid #9fbcbc;
padding:20px;
}

.visabox h3{
margin-top:0;
font-size:16px;
}

.visabox input{
width:300px;
padding:6px;
margin-top:5px;
}

.captcha{
margin:10px 0;
}

.checkbtn{
margin-top:10px;
background:#3b6ea5;
color:white;
border:none;
padding:8px 25px;
cursor:pointer;
border-radius:4px;
}

/* FOOTER */

.footer{
margin-top:40px;
border-top:1px solid #bbb;
padding:15px 40px;
display:flex;
justify-content:space-between;
font-size:13px;
color:#777;
}

</style>

</head>

<body>

<!-- HEADER -->

<div class="header">
<img src="header-banner.png">
</div>

<!-- COLOR STRIP -->

<div class="colorbar">
<div class="c1"></div>
<div class="c2"></div>
<div class="c3"></div>
<div class="c4"></div>
<div class="c5"></div>
<div class="c6"></div>
</div>

<!-- NAVIGATION -->

<div class="navbar">

<a href="index.html">START</a>
<a href="#">DO I NEED A VISA?</a>
<a href="#">APPLY NOW</a>
<a href="#">CONTINUE APPLICATION</a>
<a href="#">CHECK YOUR APPLICATION STATUS</a>
<a href="check-my-visa.html">CHECK VISA</a>

</div>

<!-- MAIN CONTENT -->

<div class="main">

<!-- LEFT PANEL -->

<div class="leftbox">

<div class="card">

<p><b>Things you should know</b></p>

<button>10 things you should know about the eVisa</button>

</div>

</div>

<!-- VISA CHECK PANEL -->

<div class="visabox">

<h3>Seeking visa</h3>

<label>Visa number</label><br>
<input type="text" id="visaNumber"><br><br>

<img src="captcha.png" class="captcha"><br>

<a href="#">Refresh</a><br><br>

<label>Verification code</label><br>
<input type="text"><br>

<button class="checkbtn" onclick="checkVisa()">Check</button>

<p id="result"></p>

</div>

</div>

<!-- FOOTER -->

<div class="footer">

<div>Version: 1.6.1.0</div>

<div>
E-mail:
<a href="#">evisa@mfa.gov.md</a>
</div>

</div>

<script>

function checkVisa(){

var visa=document.getElementById("visaNumber").value;

if(visa=="21123781"){
document.getElementById("result").innerHTML="Visa Status: Approved";
}
else{
document.getElementById("result").innerHTML="Visa number not found";
}

}

</script>

</body>

</html>
