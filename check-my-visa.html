<script>

function checkVisa(){

var captcha = grecaptcha.getResponse();

if(captcha.length === 0){

alert("Please verify that you are not a robot.");
return;
var code;

function generateCaptcha(){

var chars="ABCDEFGHJKLMNPQRSTUVWXYZ23456789";

code="";

for(var i=0;i<5;i++){

code+=chars.charAt(Math.floor(Math.random()*chars.length));

}

document.getElementById("captcha").innerHTML=code;

}

generateCaptcha();
}

var visa=document.getElementById("visa").value;

if(visa=="21123781"){
document.getElementById("result").innerHTML="Visa Status: Approved";
}
else{
document.getElementById("result").innerHTML="Visa not found";
}

}
</script>
