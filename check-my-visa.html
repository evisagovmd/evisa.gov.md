<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Check Visa Status</title>

<style>

body{
font-family: Arial, sans-serif;
margin:0;
background:#f3f3f3;
}

/* HEADER */

.header{
width:100%;
text-align:center;
background:white;
}

.header img{
width:100%;
max-height:150px;
object-fit:cover;
}

/* NAVBAR */

.navbar{
display:flex;
justify-content:center;
background:white;
border-bottom:1px solid #ddd;
}

.navbar a{
padding:15px 25px;
text-decoration:none;
color:#333;
font-weight:600;
}

.navbar a:hover{
background:#f0f0f0;
}

/* COLOR BARS */

.color-bars{
display:flex;
height:6px;
}

.bar1{background:#0072ce;flex:1;}
.bar2{background:#ffcc00;flex:1;}
.bar3{background:#e41e2b;flex:1;}
.bar4{background:#009639;flex:1;}

/* MAIN CONTAINER */

.container{
max-width:500px;
margin:60px auto;
background:white;
padding:35px;
border-radius:6px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

h2{
margin-top:0;
text-align:center;
}

/* FORM */

label{
display:block;
margin-top:15px;
font-weight:600;
}

input{
width:100%;
padding:10px;
margin-top:5px;
border:1px solid #ccc;
border-radius:4px;
}

/* CHECKBOX */

.robot-check{
margin-top:20px;
display:flex;
align-items:center;
gap:10px;
background:#f9f9f9;
padding:10px;
border:1px solid #ddd;
border-radius:4px;
}

/* BUTTON */

button{
margin-top:25px;
width:100%;
padding:12px;
background:#0072ce;
color:white;
border:none;
border-radius:4px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#005fa3;
}

/* RESULT */

.result{
margin-top:25px;
padding:15px;
border-radius:4px;
background:#f5f5f5;
border:1px solid #ddd;
}

.valid{
color:green;
font-weight:bold;
}

.invalid{
color:red;
font-weight:bold;
}

/* FOOTER */

footer{
text-align:center;
padding:25px;
margin-top:60px;
background:white;
border-top:1px solid #ddd;
font-size:13px;
color:#555;
}

</style>

</head>

<body>

<!-- HEADER IMAGE -->

<div class="header">
<img src="header-banner.png">
</div>

<!-- NAVBAR -->

<div class="navbar">
<a href="index.html">HOME</a>
<a href="check-my-visa.html">CHECK VISA</a>
<a href="#">CONTACT</a>
</div>

<!-- COLOR BARS -->

<div class="color-bars">
<div class="bar1"></div>
<div class="bar2"></div>
<div class="bar3"></div>
<div class="bar4"></div>
</div>

<!-- MAIN FORM -->

<div class="container">

<h2>Check Visa Status</h2>

<label>Visa Number</label>
<input type="text" id="visaNumber" placeholder="Enter visa number">

<label>Passport Number</label>
<input type="text" id="passportNumber" placeholder="Enter passport number">

<div class="robot-check">
<input type="checkbox" id="robotCheck">
<label for="robotCheck">I'm not a robot</label>
</div>

<button onclick="checkVisa()">Check Visa</button>

<div id="result"></div>

</div>

<footer>
Visa Verification Portal
</footer>

<script>

function checkVisa(){

var visa=document.getElementById("visaNumber").value;
var passport=document.getElementById("passportNumber").value;
var robot=document.getElementById("robotCheck").checked;

var result=document.getElementById("result");

if(!robot){

alert("Please confirm you are not a robot.");
return;

}

if(visa=="" || passport==""){

alert("Please fill all fields.");
return;

}

/* SAMPLE DATA */

if(visa=="21123781" && passport=="A11724249"){

result.innerHTML="<div class='result valid'>Visa Status: Approved</div>";

}else{

result.innerHTML="<div class='result invalid'>Visa record not found.</div>";

}

}

</script>

</body>
</html>
