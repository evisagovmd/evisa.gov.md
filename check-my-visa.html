<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Check Visa</title>

<style>

body{
font-family: Arial, sans-serif;
margin:0;
background:#f2f2f2;
}

/* MAIN PAGE WIDTH (CENTERED LIKE MOLDOVA SITE) */

.page{
max-width:1100px;
margin:auto;
background:white;
}

/* HEADER */

.header{
text-align:center;
padding:20px 0;
}

.header img{
height:110px;
}

/* NAVIGATION */

.navbar{
display:flex;
justify-content:center;
border-top:1px solid #ddd;
border-bottom:1px solid #ddd;
}

.nav-item{
text-align:center;
padding:15px 25px;
font-weight:600;
color:#333;
text-decoration:none;
position:relative;
}

.nav-item:hover{
background:#f7f7f7;
}

/* SMALL COLOR BLOCKS */

.nav-item::after{
content:"";
display:block;
height:5px;
width:100%;
position:absolute;
bottom:-1px;
left:0;
}

.home::after{background:#2b7bb9;}
.visa::after{background:#f5a623;}
.contact::after{background:#27ae60;}

/* CONTENT AREA */

.container{
max-width:500px;
margin:60px auto;
padding:35px;
border:1px solid #ddd;
background:white;
}

h2{
margin-top:0;
text-align:center;
}

/* FORM */

label{
display:block;
margin-top:15px;
font-weight:600;
}

input{
width:100%;
padding:10px;
margin-top:5px;
border:1px solid #ccc;
}

/* CHECKBOX */

.robot-check{
margin-top:20px;
display:flex;
align-items:center;
gap:10px;
}

/* BUTTON */

button{
margin-top:25px;
width:100%;
padding:12px;
background:#2b7bb9;
color:white;
border:none;
cursor:pointer;
}

button:hover{
background:#1f5f8d;
}

/* RESULT */

.result{
margin-top:20px;
padding:15px;
border:1px solid #ddd;
background:#f9f9f9;
}

.valid{
color:green;
font-weight:bold;
}

.invalid{
color:red;
font-weight:bold;
}

/* FOOTER */

footer{
text-align:center;
padding:30px;
border-top:1px solid #ddd;
margin-top:60px;
font-size:13px;
color:#555;
}

</style>

</head>

<body>

<div class="page">

<!-- HEADER -->

<div class="header">
<img src="header-banner.png">
</div>

<!-- NAVIGATION -->

<div class="navbar">

<a class="nav-item home" href="index.html">HOME</a>

<a class="nav-item visa" href="check-my-visa.html">CHECK VISA</a>

<a class="nav-item contact" href="#">CONTACT</a>

</div>

<!-- FORM -->

<div class="container">

<h2>Check Visa Status</h2>

<label>Visa Number</label>
<input type="text" id="visa">

<label>Passport Number</label>
<input type="text" id="passport">

<div class="robot-check">
<input type="checkbox" id="robot">
<label for="robot">I'm not a robot</label>
</div>

<button onclick="checkVisa()">Check Visa</button>

<div id="result"></div>

</div>

<footer>
Visa Verification Portal
</footer>

</div>

<script>

function checkVisa(){

var visa=document.getElementById("visa").value;
var passport=document.getElementById("passport").value;
var robot=document.getElementById("robot").checked;

var result=document.getElementById("result");

if(!robot){
alert("Please confirm you are not a robot.");
return;
}

if(visa=="21123781" && passport=="A11724249"){

result.innerHTML="<div class='result valid'>Visa Status: Approved</div>";

}else{

result.innerHTML="<div class='result invalid'>Visa record not found</div>";

}

}

</script>

</body>
</html>
