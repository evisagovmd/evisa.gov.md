<!DOCTYPE html>
<html>

<head>

<title>Check Visa</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#efefef;
}

/* CENTER CONTAINER */

.page-container{
width:1000px;
margin:0 auto;
background:white;
}

/* HEADER */

.header img{
width:100%;
display:block;
}

/* NAVIGATION */

.navbar{
display:flex;
background:#2f65a7;
}

.nav-item{
flex:1;
text-align:center;
}

.nav-color{
height:6px;
}

.nav-item a{
display:block;
color:white;
text-decoration:none;
padding:12px 0;
font-size:14px;
}

.nav-item a:hover{
background:#1e4c86;
}

/* COLORS */

.c1{background:#f6a623;}
.c2{background:#a142f4;}
.c3{background:#34a853;}
.c4{background:#4285f4;}
.c5{background:#ea4335;}
.c6{background:#fbbc05;}

/* MAIN CONTENT */

.main{
padding:40px;
display:flex;
justify-content:center;
}

/* VISA FORM */

.visa-box{
width:420px;
border:1px solid #ccc;
padding:25px;
background:white;
}

.visa-box h2{
margin-top:0;
}

label{
display:block;
margin-top:15px;
font-weight:bold;
}

input{
width:100%;
padding:8px;
margin-top:5px;
border:1px solid #ccc;
}

.robot{
margin-top:15px;
}

button{
margin-top:20px;
padding:10px;
width:100%;
background:#4d87c7;
border:none;
color:white;
cursor:pointer;
}

button:hover{
background:#376ea7;
}

.result{
margin-top:20px;
padding:10px;
border:1px solid #ccc;
background:#f5f5f5;
}

/* FOOTER */

.footer{
border-top:1px solid #bbb;
padding:15px 40px;
display:flex;
justify-content:space-between;
font-size:13px;
color:#777;
}

</style>

</head>

<body>

<div class="page-container">

<!-- HEADER -->

<div class="header">
<img src="header-banner.png">
</div>

<!-- NAVBAR -->

<div class="navbar">

<div class="nav-item">
<div class="nav-color c1"></div>
<a href="index.html">START</a>
</div>

<div class="nav-item">
<div class="nav-color c2"></div>
<a href="#">DO I NEED A VISA?</a>
</div>

<div class="nav-item">
<div class="nav-color c3"></div>
<a href="#">APPLY NOW</a>
</div>

<div class="nav-item">
<div class="nav-color c4"></div>
<a href="#">CONTINUE APPLICATION</a>
</div>

<div class="nav-item">
<div class="nav-color c5"></div>
<a href="#">CHECK YOUR APPLICATION STATUS</a>
</div>

<div class="nav-item">
<div class="nav-color c6"></div>
<a href="check-my-visa.html">CHECK VISA</a>
</div>

</div>

<!-- MAIN -->

<div class="main">

<div class="visa-box">

<h2>Check Visa Status</h2>

<label>Visa Number</label>
<input type="text" id="visa">

<label>Passport Number</label>
<input type="text" id="passport">

<div class="robot">
<input type="checkbox" id="robot"> I'm not a robot
</div>

<button onclick="checkVisa()">Check Visa</button>

<div id="result"></div>

</div>

</div>

<!-- FOOTER -->

<div class="footer">

<div>Version: 1.6.1.0</div>

<div>
E-mail:
<a href="#">evisa@mfa.gov.md</a>
</div>

</div>

</div>

<script>

function checkVisa(){

var visa=document.getElementById("visa").value;
var passport=document.getElementById("passport").value;
var robot=document.getElementById("robot").checked;

if(!robot){
alert("Please confirm you are not a robot");
return;
}

var result=document.getElementById("result");

if(visa=="21123781" && passport=="A11724249"){

result.innerHTML="<div class='result' style='color:green'>Visa Status: Approved</div>";

}else{

result.innerHTML="<div class='result' style='color:red'>Visa not found</div>";

}

}

</script>

</body>
</html>
